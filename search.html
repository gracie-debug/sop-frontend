<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SOP Search</title>
</head>
<body>
  <h2>SOP Search</h2>
  
  <input id="q" placeholder="Search..." style="width:300px;">
  <button onclick="search()">Go</button>

  <div id="results"></div>

  <script>
    async function search() {
      const q = document.getElementById("q").value;
      if (!q) {
        alert("Type something to search.");
        return;
      }

      const res = await fetch("[sop-backend-2dvb.onrender.com](https://sop-backend-2dvb.onrender.com/search?q=)" + encodeURIComponent(q));
      const data = await res.json();

      let html = "";
      data.forEach(sop => {
        html += `
          <h3>${sop.title}</h3>
          <p>${sop.content.substring(0,300)}...</p>
          <hr>
        `;
      });

      document.getElementById("results").innerHTML = html || "<p>No results found.</p>";
    }
  </script>
</body>
</html>
