<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Upload SOP</title>
</head>
<body>
  <h2>Upload SOP</h2>

  <input type="file" id="file">
  <button onclick="upload()">Upload</button>

  <div id="msg"></div>

  <script>
    async function upload() {
      const file = document.getElementById("file").files[0];
      if (!file) {
        alert("Please select a file first.");
        return;
      }

      const formData = new FormData();
      formData.append("file", file);

      // CORRECT URL — no brackets, no markdown
      const res = await fetch("[sop-backend-2dvb.onrender.com](https://sop-backend-2dvb.onrender.com/upload)", {
        method: "POST",
        body: formData
      });

      const r = await res.json();
      document.getElementById("msg").innerText = r.status || "Uploaded";
    }
  </script>
</body>
</html>
